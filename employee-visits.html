<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Visits — Satellite Home Watch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/employee.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar" role="navigation"></aside>

  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
          </svg>
        </button>
        <div class="topbar-page-title">
          <span class="topbar-title-text">My Visits</span>
          <span class="topbar-welcome">All assigned inspection visits</span>
        </div>
      </div>
      <div class="topbar-right">
        <!-- Messages notification icon -->
        <button
          class="topbar-icon-btn emp-msg-notif-btn"
          id="empMsgNotifBtn"
          aria-label="Message notifications"
          title="Messages"
          type="button"
          onclick="openEmpMsgNotif(this)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          <span class="topbar-notif-badge" id="empMsgBadge" style="display:none;"></span>
        </button>
        <button
          class="topbar-icon-btn np-bell-btn"
          data-notif-trigger="employee"
          aria-label="Open notifications"
          aria-haspopup="dialog"
          aria-expanded="false"
          title="Notifications"
          type="button"
          onclick="SHWNotifPanel.toggle(this)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span class="topbar-notif-badge"></span>
        </button>
        <span class="role-chip inspector">Inspector</span>
        <div class="topbar-avatar" id="topbarAvatar">—</div>
      </div>
    </header>

    <main class="dashboard-content" style="padding:24px;">

      <!-- Filter + Search Bar -->
      <div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:16px 20px;margin-bottom:24px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;">
        <div style="position:relative;flex:1;min-width:200px;">
          <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;color:#94a3b8;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" placeholder="Search visits or properties…" oninput="filterVisits()"
            style="width:100%;padding:8px 12px 8px 32px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:inherit;box-sizing:border-box;outline:none;" />
        </div>
        <select id="statusFilter" onchange="filterVisits()"
          style="border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;background:#f8fafc;outline:none;">
          <option value="">All Statuses</option>
          <option value="scheduled">Scheduled</option>
          <option value="en_route">En Route</option>
          <option value="arrived">Arrived</option>
          <option value="in_progress">In Progress</option>
          <option value="completed">Completed</option>
        </select>
        <select id="periodFilter" onchange="filterVisits()"
          style="border:1px solid #e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;font-family:inherit;background:#f8fafc;outline:none;">
          <option value="upcoming">Upcoming</option>
          <option value="30d">Last 30 Days</option>
          <option value="90d">Last 90 Days</option>
          <option value="all">All Time</option>
        </select>
        <div id="visitCount" style="font-size:13px;color:#64748b;white-space:nowrap;"></div>
      </div>

      <!-- Stat chips -->
      <div style="display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
        <div style="background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
          <div style="font-size:22px;font-weight:700;color:#162d56;" id="chipUpcoming">—</div>
          <div style="font-size:11px;color:#64748b;">Upcoming</div>
        </div>
        <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
          <div style="font-size:22px;font-weight:700;color:#166534;" id="chipCompleted">—</div>
          <div style="font-size:11px;color:#64748b;">Completed</div>
        </div>
        <div style="background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
          <div style="font-size:22px;font-weight:700;color:#c2410c;" id="chipActive">—</div>
          <div style="font-size:11px;color:#64748b;">Active Now</div>
        </div>
      </div>

      <!-- Visit List -->
      <div id="visitList">
        <div class="emp-empty-state">
          <div class="emp-empty-title">Loading visits…</div>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- Message Notifications Panel -->
<div id="empMsgNotifPanel" style="display:none;position:fixed;top:60px;right:16px;width:340px;max-width:calc(100vw - 32px);background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 32px rgba(22,45,86,.15);z-index:9999;">
  <div style="padding:14px 16px 10px;border-bottom:1px solid #f1f5f9;display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:14px;font-weight:700;color:#0f1e38;">Message Notifications</div>
    <button onclick="closeEmpMsgNotif()" style="background:none;border:none;font-size:18px;color:#94a3b8;cursor:pointer;line-height:1;">×</button>
  </div>
  <div id="empMsgNotifList" style="max-height:340px;overflow-y:auto;padding:8px 0;">
    <div style="padding:20px;text-align:center;color:#94a3b8;font-size:13px;">No new messages</div>
  </div>
  <div style="padding:10px 16px;border-top:1px solid #f1f5f9;text-align:center;">
    <a href="employee-messages.html" style="font-size:13px;font-weight:600;color:#162d56;text-decoration:none;">View All Messages →</a>
  </div>
</div>

<script src="js/nav.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/db.js"></script>
<script src="js/emp-app.js"></script>
<script src="js/notifications-data.js"></script>
<script src="js/notif-panel.js"></script>
<script src="js/emp-msg-notif.js"></script>
<script>
let _allVisits = [];
let _propMap   = {};

document.addEventListener('DOMContentLoaded', async () => {
  renderEmpSidebar('emp-visits');
  await loadVisits();
  initEmpMsgNotif();
});

// ─── NO PLACEHOLDER DATA ──────────────────────────────────────────────────────
// All visit data is loaded exclusively from the backend API.

async function loadVisits() {
  const [visitsRes, propsRes, empsRes] = await Promise.all([
    empApiGetAll('visits'),
    empApiGetAll('properties'),
    empApiGetAll('employees'),
  ]);

  _propMap = buildMap(propsRes.data || []);
  const empMap = buildMap(empsRes.data || []);
  const myEmp = (empsRes.data || []).find(e => e.user_id === EMP_SESSION.userId);
  const myEmpId = myEmp?.id;

  const realVisits = (visitsRes.data || [])
    .filter(v => v.assigned_employee_id === myEmpId)
    .sort((a,b) => new Date(b.scheduled_start) - new Date(a.scheduled_start));

  _allVisits = realVisits;

  // Update chips
  const now = new Date();
  const upcoming  = _allVisits.filter(v => ['scheduled','en_route','arrived','in_progress'].includes(v.status) && new Date(v.scheduled_start) >= now);
  const completed = _allVisits.filter(v => v.status === 'completed');
  const active    = _allVisits.filter(v => ['en_route','arrived','in_progress'].includes(v.status));
  document.getElementById('chipUpcoming').textContent  = upcoming.length;
  document.getElementById('chipCompleted').textContent = completed.length;
  document.getElementById('chipActive').textContent    = active.length;

  filterVisits();
}

function filterVisits() {
  const q      = (document.getElementById('searchInput').value || '').toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const period = document.getElementById('periodFilter').value;
  const now    = new Date();

  let filtered = _allVisits.filter(v => {
    const prop = _propMap[v.property_id] || {};
    const matchQ = !q ||
      (prop.property_name || '').toLowerCase().includes(q) ||
      (prop.address_line1 || '').toLowerCase().includes(q) ||
      (v.visit_type || '').toLowerCase().includes(q);
    const matchS = !status || v.status === status;

    let matchP = true;
    const d = new Date(v.scheduled_start);
    if (period === 'upcoming') {
      matchP = ['scheduled','en_route','arrived','in_progress'].includes(v.status) || d >= now;
    } else if (period === '30d') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 30);
      matchP = d >= cutoff;
    } else if (period === '90d') {
      const cutoff = new Date(now); cutoff.setDate(cutoff.getDate() - 90);
      matchP = d >= cutoff;
    }
    return matchQ && matchS && matchP;
  });

  document.getElementById('visitCount').textContent = `${filtered.length} visit${filtered.length !== 1 ? 's' : ''}`;
  renderVisitList(filtered);
}

function renderVisitList(visits) {
  const container = document.getElementById('visitList');
  if (!visits.length) {
    container.innerHTML = `
      <div class="emp-empty-state">
        <div class="emp-empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        </div>
        <div class="emp-empty-title">No visits found</div>
        <div class="emp-empty-text">Try adjusting your filters.</div>
      </div>`;
    return;
  }

  const pillClass = {
    scheduled: 'pill-scheduled', en_route: 'pill-en_route',
    arrived: 'pill-arrived', in_progress: 'pill-in_progress', completed: 'pill-completed',
  };

  container.innerHTML = `<div class="emp-visit-queue">${visits.map(v => {
    const prop     = _propMap[v.property_id] || {};
    const isActive = ['en_route','arrived','in_progress'].includes(v.status);
    const pill     = pillClass[v.status] || 'pill-scheduled';

    const actionLabel = isActive ? 'Continue Visit' :
                        v.status === 'scheduled' ? 'Start Visit' :
                        v.status === 'completed' ? 'View Report' : 'View Details';
    const btnClass = isActive ? 'emp-btn-start in-progress' : v.status === 'completed' ? 'emp-btn-secondary' : 'emp-btn-start';

    return `
      <div class="emp-visit-card ${isActive ? 'active-visit' : ''}">
        <div class="emp-visit-card-body">
          <div class="emp-visit-card-top">
            <div>
              <div class="emp-visit-property-name">${prop.property_name || '—'}</div>
              <div class="emp-visit-address">${prop.address_line1 || ''} ${prop.city || ''}, ${prop.state || ''}</div>
            </div>
            <div class="emp-visit-time-badge">${FMT.time(v.scheduled_start)}</div>
          </div>
          <div class="emp-visit-meta">
            <span class="emp-visit-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${FMT.date(v.scheduled_start)}
            </span>
            <span class="emp-visit-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="10 8 16 12 10 16"/></svg>
              ${FMT.snakeToTitle(v.visit_type)}
            </span>
            ${v.status === 'completed' && v.actual_start && v.actual_end ? `
            <span class="emp-visit-meta-item">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              ${Math.round((new Date(v.actual_end) - new Date(v.actual_start)) / 60000)} min
            </span>` : ''}
            <span class="emp-status-pill ${pill}">${FMT.snakeToTitle(v.status)}</span>
          </div>
          <div class="emp-visit-actions">
            <button class="${btnClass}" onclick="window.location.href='employee-visit-detail.html?visitId=${v.id}'">${actionLabel}</button>
            <button class="emp-btn-secondary" onclick="window.location.href='employee-visit-detail.html?visitId=${v.id}'">Details</button>
          </div>
        </div>
      </div>`;
  }).join('')}</div>`;
}
</script>
</body>
</html>
