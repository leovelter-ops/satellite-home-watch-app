<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients — Satellite Home Watch Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/dashboard.css" />
  <link rel="stylesheet" href="css/admin.css" />
  <link rel="stylesheet" href="css/notifications.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>
<div class="app-wrapper">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <aside class="sidebar" id="sidebar" role="navigation"></aside>
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <button class="topbar-menu-btn" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="topbar-page-title">
          <span class="topbar-title-text">Clients</span>
          <span class="topbar-welcome">Manage client accounts and property access</span>
        </div>
      </div>
      <div class="topbar-right">
        <button
          class="topbar-icon-btn"
          data-msg-trigger="admin"
          aria-label="Open messages"
          aria-haspopup="dialog"
          title="Messages"
          type="button"
          onclick="SHWMsgPanel.toggle(this)"
          style="position:relative;"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
          <span data-msg-badge style="display:none;position:absolute;top:-4px;right:-4px;min-width:16px;height:16px;border-radius:8px;background:#ef4444;color:#fff;font-size:9px;font-weight:700;line-height:16px;text-align:center;padding:0 3px;border:1.5px solid #fff;"></span>
        </button>
        <button
          class="topbar-icon-btn np-bell-btn"
          data-notif-trigger="admin"
          aria-label="Open notifications"
          aria-haspopup="dialog"
          aria-expanded="false"
          title="Notifications"
          type="button"
          onclick="SHWNotifPanel.toggle(this)"
        >
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          <span class="topbar-notif-badge"></span>
        </button>
        <button class="admin-add-btn" onclick="openClientModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Client
        </button>
        <span class="admin-badge manager" id="topbarRoleBadge">Manager</span>
        <div class="topbar-avatar" id="topbarAvatar">—</div>
      </div>
    </header>

    <main class="dashboard-content" style="padding:24px;">

      <!-- Bulk Action Bar (visible when clients are selected) -->
      <div id="bulkActionBar" style="display:none;background:#162d56;border-radius:10px;padding:12px 18px;margin-bottom:16px;display:none;align-items:center;gap:14px;">
        <span id="bulkSelCount" style="color:#fff;font-size:13px;font-weight:700;">0 selected</span>
        <div style="flex:1;"></div>
        <button onclick="openBulkEmailModal()" style="display:flex;align-items:center;gap:7px;background:#fff;color:#162d56;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          Send Bulk Email
        </button>
        <button onclick="clearSelection()" style="background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;">Clear Selection</button>
      </div>

      <div class="admin-table-card">
        <div class="admin-table-header">
          <div class="admin-table-title" id="tableTitle">All Clients</div>
          <div class="admin-table-actions">
            <div class="admin-search-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input type="text" class="admin-search-input" id="clientSearch" placeholder="Search clients…" oninput="filterClients()" />
            </div>
            <select class="admin-filter-select" id="clientStatus" onchange="filterClients()">
              <option value="">All Statuses</option>
              <option value="active">Active</option>
              <option value="inactive">Inactive</option>
              <option value="pending">Pending</option>
            </select>
          </div>
        </div>
        <div id="clientTableBody">
          <div style="padding:30px;text-align:center;color:#94a3b8;font-size:13px;">Loading clients…</div>
        </div>
        <div class="admin-pagination" id="paginationRow"></div>
      </div>

    </main>
  </div>
</div>

<!-- Bulk Email Modal -->
<div id="bulkEmailModal" class="admin-modal-overlay" style="display:none;">
  <div class="admin-modal" style="max-width:600px;width:95%;">
    <div class="admin-modal-header">
      <div class="admin-modal-title">Send Bulk Email</div>
      <button class="admin-modal-close" onclick="closeBulkEmailModal()">✕</button>
    </div>
    <div class="admin-modal-body">
      <div style="background:#f0f6ff;border:1px solid #bfdbfe;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:12px;color:#1e40af;">
        <strong>Recipients:</strong> <span id="bulkEmailRecipientSummary">0 clients selected</span>
      </div>
      <div class="admin-form-group">
        <label class="admin-form-label">Select Template *</label>
        <select class="admin-form-select" id="bulkEmailTemplate" onchange="previewBulkTemplate()">
          <option value="">— Choose an email template —</option>
          <optgroup label="Promotions">
            <option value="promo_seasonal">Seasonal Check-In</option>
            <option value="promo_renewal">Service Plan Renewal</option>
          </optgroup>
          <optgroup label="Account &amp; Invitation" id="bulkTplAccountGroup"></optgroup>
          <optgroup label="Visit &amp; Inspection" id="bulkTplVisitGroup"></optgroup>
          <optgroup label="Custom Templates" id="bulkTplCustomGroup" style="display:none;"></optgroup>
        </select>
      </div>
      <div id="bulkEmailPreview" style="display:none;background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:16px;margin-top:12px;">
        <div style="font-size:11px;font-weight:700;color:#162d56;text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;">Template Preview</div>
        <div style="font-size:12px;color:#64748b;margin-bottom:6px;"><strong>Subject:</strong> <span id="bulkPreviewSubject"></span></div>
        <div style="font-size:12px;color:#334155;white-space:pre-wrap;max-height:200px;overflow-y:auto;border-top:1px solid #e2e8f0;padding-top:10px;" id="bulkPreviewBody"></div>
      </div>
      <div style="margin-top:16px;">
        <label class="admin-form-label">Additional Note <span style="color:#94a3b8;font-weight:400;">(optional — appended to template)</span></label>
        <textarea class="admin-form-textarea admin-form-input" id="bulkEmailNote" rows="3" style="margin-top:6px;resize:vertical;" placeholder="Add a personal note or campaign-specific message…"></textarea>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn-secondary-outline" onclick="closeBulkEmailModal()">Cancel</button>
      <button class="btn-primary" onclick="sendBulkEmail()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:middle;margin-right:5px;"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send to <span id="bulkSendCount">0</span> Client(s)
      </button>
    </div>
  </div>
</div>

<!-- Add/Edit Client Modal -->
<div id="clientModal" class="admin-modal-overlay" style="display:none;">
  <div class="admin-modal">
    <div class="admin-modal-header">
      <div class="admin-modal-title" id="clientModalTitle">Add New Client</div>
      <button class="admin-modal-close" onclick="closeClientModal()">✕</button>
    </div>
    <div class="admin-modal-body">
      <div class="admin-form-section"><div class="admin-form-section-title">Account Details</div></div>
      <div class="admin-form-grid">
        <div class="admin-form-group">
          <label class="admin-form-label">First Name *</label>
          <input type="text" class="admin-form-input" id="cFirstName" placeholder="James" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Last Name *</label>
          <input type="text" class="admin-form-input" id="cLastName" placeholder="Montrose" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Email *</label>
          <input type="email" class="admin-form-input" id="cEmail" placeholder="james@example.com" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Phone</label>
          <input type="tel" class="admin-form-input" id="cPhone" placeholder="+1 (000) 000-0000" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Company / Trust Name</label>
          <input type="text" class="admin-form-input" id="cCompany" placeholder="Optional" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Status</label>
          <select class="admin-form-select" id="cStatus">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="admin-form-section"><div class="admin-form-section-title">Billing Address</div></div>
      <div class="admin-form-grid">
        <div class="admin-form-group admin-form-full">
          <label class="admin-form-label">Address</label>
          <input type="text" class="admin-form-input" id="cBillingAddr" placeholder="Street address" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">City</label>
          <input type="text" class="admin-form-input" id="cBillingCity" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">State</label>
          <input type="text" class="admin-form-input" id="cBillingState" placeholder="FL" maxlength="2" />
        </div>
        <div class="admin-form-group">
          <label class="admin-form-label">Notes</label>
          <textarea class="admin-form-textarea" id="cNotes" rows="2" placeholder="Internal notes…"></textarea>
        </div>
      </div>
    </div>
    <div class="admin-modal-footer">
      <button class="btn-secondary-outline" onclick="closeClientModal()">Cancel</button>
      <button class="btn-primary" id="clientSubmitBtn" onclick="submitClient()">Add Client</button>
    </div>
  </div>
</div>

<!-- Client Detail Side Panel (full-page overlay) -->
<div id="clientDetailPanel" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900;display:none;align-items:center;justify-content:flex-end;">
  <div style="width:480px;max-width:100%;height:100%;background:#fff;overflow-y:auto;box-shadow:-10px 0 40px rgba(0,0,0,.15);">
    <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1;">
      <div style="font-size:16px;font-weight:700;color:#0f1e38;" id="detailClientName">Client Detail</div>
      <button class="admin-modal-close" onclick="closeClientDetail()">✕</button>
    </div>
    <div style="padding:24px;" id="detailClientBody">Loading…</div>
  </div>
</div>

<script src="js/nav.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/emp-app.js"></script>
<script src="js/notifications-data.js"></script>
<script src="js/notif-panel.js"></script>
<script src="js/messages-panel.js"></script>
<script>
const ADMIN_SESSION = _resolveAdminSession(null) || { userId: '', role: 'manager', name: '', initials: '' };

let _clients  = [];
let _users    = [];
let _props    = [];
let _editing  = null;
let _selectedClients = new Set();
// Built-in promotion + other templates for bulk email (mirrors email-templates page)
const BULK_EMAIL_TEMPLATES = [
  { id: 'promo_seasonal',  category:'promotion', name:'Seasonal Check-In',       subject:'{{season}} Property Care Check — Exclusive Offer for {{customer_name}}', body:`Dear {{customer_name}},

As {{season}} approaches, we want to make sure your property is fully prepared and protected.

{{offer_details}}

Log in to your portal to learn more:
  {{portal_url}}

Warm regards,
The Satellite Home Watch Team` },
  { id: 'promo_renewal',  category:'promotion', name:'Service Plan Renewal',     subject:'Your Satellite Home Watch Plan Renewal — {{customer_name}}', body:`Dear {{customer_name}},

Your current service plan ({{plan_name}}) is coming up for renewal on {{renewal_date}}.

{{upgrade_offer}}

Log in to manage your plan:
  {{portal_url}}

Best regards,
The Satellite Home Watch Team` },
  { id: 'welcome',        category:'account',   name:'Welcome / Activation',    subject:'Welcome to Satellite Home Watch — Your account is ready!', body:`Welcome, {{customer_name}}!

Your portal account is now fully activated and ready to use.

Sign in here: {{portal_url}}

Warm regards,
The Satellite Home Watch Team` },
  { id: 'visit_completed',category:'visit',     name:'Visit Completed',          subject:'Visit Completed — {{property_name}} on {{visit_date}}', body:`Dear {{customer_name}},

Your inspection at {{property_name}} on {{visit_date}} has been completed.

View your report: {{report_url}}

Best regards,
The Satellite Home Watch Team` },
];
let _bulkCustomTemplates = [];

document.addEventListener('DOMContentLoaded', async () => {
  renderAdminSidebar('crm-customers');
  await loadClients();
  if (window.location.hash === '#new') openClientModal();
  // Close bulk email modal on overlay click
  document.getElementById('bulkEmailModal').addEventListener('click', e => {
    if (e.target === document.getElementById('bulkEmailModal')) closeBulkEmailModal();
  });
});

async function loadClients() {
  const [clientsRes, usersRes, propsRes] = await Promise.all([
    empApiGetAll('clients'),
    empApiGetAll('users'),
    empApiGetAll('properties'),
  ]);
  _clients = clientsRes.data || [];
  _users   = usersRes.data   || [];
  _props   = propsRes.data   || [];
  filterClients();
}

function filterClients() {
  const q       = (document.getElementById('clientSearch').value || '').toLowerCase();
  const status  = document.getElementById('clientStatus').value;
  const userMap = buildMap(_users);

  const filtered = _clients.filter(c => {
    const user = userMap[c.user_id] || {};
    const name = (user.full_name || '').toLowerCase();
    const co   = (c.company_name || '').toLowerCase();
    const email= (user.email || '').toLowerCase();
    const matchQ = !q || name.includes(q) || co.includes(q) || email.includes(q);
    const matchS = !status || c.status === status;
    return matchQ && matchS;
  });

  document.getElementById('tableTitle').textContent = `Clients (${filtered.length})`;
  renderClientTable(filtered, userMap);
}

function renderClientTable(clients, userMap) {
  if (!clients.length) {
    document.getElementById('clientTableBody').innerHTML = `
      <div class="admin-empty-state">
        <div class="admin-empty-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div>
        <div class="admin-empty-title">No clients found</div>
        <div class="admin-empty-text">Add your first client to get started.</div>
      </div>`;
    document.getElementById('paginationRow').innerHTML = '';
    return;
  }

  // ── Desktop table rows ──────────────────────────────────────────────────────
  const tableRows = clients.map(c => {
      const user = userMap[c.user_id] || {};
      const propCount = _props.filter(p => p.client_id === c.id).length;
      const initials  = FMT.initials(user.full_name || c.company_name || '??');
      const isChecked = _selectedClients.has(c.id);
      return `<tr style="${isChecked ? 'background:#f0f5ff;' : ''}">
        <td style="width:36px;padding-left:14px;">
          <input type="checkbox" style="width:15px;height:15px;accent-color:#162d56;cursor:pointer;" ${isChecked ? 'checked' : ''}
            onchange="toggleClientSelect('${c.id}', this.checked)" onclick="event.stopPropagation()" />
        </td>
        <td>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:34px;height:34px;border-radius:50%;background:#162d56;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials}</div>
            <div>
              <div class="cell-primary">${user.full_name || '—'}</div>
              ${c.company_name ? `<div class="cell-secondary">${c.company_name}</div>` : ''}
            </div>
          </div>
        </td>
        <td><div>${user.email || '—'}</div><div class="cell-secondary">${c.phone || user.phone || '—'}</div></td>
        <td style="font-weight:600;color:#162d56;">${propCount} propert${propCount !== 1 ? 'ies' : 'y'}</td>
        <td><span class="tbl-status ${c.status || 'active'}">${c.status || 'active'}</span></td>
        <td style="color:#64748b;font-size:12px;">${FMT.date(c.created_at)}</td>
        <td class="cell-actions">
          <button class="tbl-action-btn" onclick="openClientDetail('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="10 8 16 12 10 16"/></svg>
            View
          </button>
          <button class="tbl-action-btn" onclick="editClient('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
            Edit
          </button>
        </td>
      </tr>`;
  }).join('');

  // ── Mobile cards ────────────────────────────────────────────────────────────
  const mobileCards = clients.map(c => {
    const user      = userMap[c.user_id] || {};
    const propCount = _props.filter(p => p.client_id === c.id).length;
    const initials  = FMT.initials(user.full_name || c.company_name || '??');
    const status    = c.status || 'active';
    return `
      <div class="admin-mobile-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
          <div style="display:flex;align-items:center;gap:10px;min-width:0;">
            <div style="width:36px;height:36px;border-radius:50%;background:#162d56;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${initials}</div>
            <div style="min-width:0;">
              <div style="font-size:14px;font-weight:700;color:#0f1e38;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${user.full_name || '—'}</div>
              ${c.company_name ? `<div style="font-size:11px;color:#64748b;">${c.company_name}</div>` : ''}
            </div>
          </div>
          <span class="tbl-status ${status}" style="flex-shrink:0;">${status}</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            ${user.email || '—'}
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
            ${c.phone || user.phone || '—'}
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
            <span style="font-weight:600;color:#162d56;">${propCount} propert${propCount !== 1 ? 'ies' : 'y'}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#475569;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Member since ${FMT.date(c.created_at)}
          </div>
        </div>
        <div style="display:flex;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #f1f5f9;">
          <button class="tbl-action-btn" style="flex:1;justify-content:center;" onclick="openClientDetail('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><circle cx="12" cy="12" r="10"/><polyline points="10 8 16 12 10 16"/></svg>
            View
          </button>
          <button class="tbl-action-btn" style="flex:1;justify-content:center;" onclick="editClient('${c.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:13px;height:13px;"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
            Edit
          </button>
        </div>
      </div>`;
  }).join('');

  const html = `
    <table class="admin-data-table">
      <thead><tr>
        <th style="width:36px;padding-left:14px;"><input type="checkbox" id="selectAllCheck" style="width:15px;height:15px;accent-color:#162d56;cursor:pointer;" onchange="toggleSelectAll(this.checked)" /></th>
        <th>Client</th><th>Contact</th><th>Properties</th><th>Status</th><th>Member Since</th><th style="text-align:right;">Actions</th>
      </tr></thead>
      <tbody>${tableRows}</tbody>
    </table>
    <div class="admin-mobile-cards-list">${mobileCards}</div>`;

  document.getElementById('clientTableBody').innerHTML = html;
  document.getElementById('paginationRow').innerHTML = `<span>${clients.length} client${clients.length !== 1 ? 's' : ''} shown</span>`;
  updateBulkActionBar();
}

function openClientModal(clientId = null) {
  _editing = clientId;
  document.getElementById('clientModalTitle').textContent = clientId ? 'Edit Client' : 'Add New Client';
  document.getElementById('clientSubmitBtn').textContent  = clientId ? 'Save Changes' : 'Add Client';

  if (clientId) {
    const client = _clients.find(c => c.id === clientId);
    const user   = _users.find(u => u.id === client?.user_id) || {};
    if (client) {
      const nameParts = (user.full_name || '').split(' ');
      document.getElementById('cFirstName').value    = nameParts[0] || '';
      document.getElementById('cLastName').value     = nameParts.slice(1).join(' ') || '';
      document.getElementById('cEmail').value        = user.email || '';
      document.getElementById('cPhone').value        = client.phone || '';
      document.getElementById('cCompany').value      = client.company_name || '';
      document.getElementById('cStatus').value       = client.status || 'active';
      document.getElementById('cBillingAddr').value  = client.billing_address_line1 || '';
      document.getElementById('cBillingCity').value  = client.billing_city || '';
      document.getElementById('cBillingState').value = client.billing_state || '';
      document.getElementById('cNotes').value        = client.notes || '';
    }
  } else {
    ['cFirstName','cLastName','cEmail','cPhone','cCompany','cBillingAddr','cBillingCity','cBillingState','cNotes'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    document.getElementById('cStatus').value = 'active';
  }
  document.getElementById('clientModal').style.display = 'flex';
}
function closeClientModal() { document.getElementById('clientModal').style.display = 'none'; _editing = null; }
function editClient(id) { openClientModal(id); }

async function submitClient() {
  const firstName = document.getElementById('cFirstName').value.trim();
  const lastName  = document.getElementById('cLastName').value.trim();
  const email     = document.getElementById('cEmail').value.trim();
  const phone     = document.getElementById('cPhone').value.trim();
  const company   = document.getElementById('cCompany').value.trim();
  const status    = document.getElementById('cStatus').value;
  const addr      = document.getElementById('cBillingAddr').value.trim();
  const city      = document.getElementById('cBillingCity').value.trim();
  const state     = document.getElementById('cBillingState').value.trim();
  const notes     = document.getElementById('cNotes').value.trim();

  if (!firstName || !email) { showToast('First name and email are required', 'error'); return; }

  const now = new Date().toISOString();

  if (_editing) {
    // Update existing
    const client = _clients.find(c => c.id === _editing);
    if (client) {
      await empApiPatch('clients', _editing, {
        company_name: company, phone, status,
        billing_address_line1: addr, billing_city: city, billing_state: state,
        notes, updated_at: now,
      });
      const user = _users.find(u => u.id === client.user_id);
      if (user) {
        await empApiPatch('users', user.id, {
          full_name: `${firstName} ${lastName}`.trim(),
          email, updated_at: now,
        });
      }
    }
    showToast('Client updated', 'success');
  } else {
    // Create user first
    const { data: newUser, error: uErr } = await empApiPost('users', {
      full_name: `${firstName} ${lastName}`.trim(),
      email, phone, role: 'client',
      status: 'active', created_at: now, updated_at: now,
    });
    if (uErr || !newUser) { showToast('Failed to create user: ' + uErr, 'error'); return; }

    // Create client record
    const { error: cErr } = await empApiPost('clients', {
      user_id: newUser.id, company_name: company, phone, status,
      billing_address_line1: addr, billing_city: city, billing_state: state,
      notes, created_at: now, updated_at: now,
    });
    if (cErr) { showToast('Failed to create client record: ' + cErr, 'error'); return; }
    showToast(`Client ${firstName} ${lastName} added successfully!`, 'success');
  }

  closeClientModal();
  await loadClients();
}

async function openClientDetail(clientId) {
  const client = _clients.find(c => c.id === clientId);
  if (!client) return;
  const userMap = buildMap(_users);
  const user    = userMap[client.user_id] || {};
  const props   = _props.filter(p => p.client_id === clientId);

  document.getElementById('detailClientName').textContent = user.full_name || '—';

  const [visitsRes, alertsRes] = await Promise.all([
    empApiGetAll('visits'),
    empApiGetAll('alerts'),
  ]);

  const propIds       = new Set(props.map(p => p.id));
  const clientVisits  = (visitsRes.data || []).filter(v => propIds.has(v.property_id));
  const clientAlerts  = (alertsRes.data || []).filter(a => propIds.has(a.property_id) && ['open','in_progress'].includes(a.status));
  const upcoming      = clientVisits.filter(v => v.status === 'scheduled' && new Date(v.scheduled_start) >= new Date());

  document.getElementById('detailClientBody').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#162d56;">${props.length}</div>
        <div style="font-size:11px;color:#64748b;">Properties</div>
      </div>
      <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#166534;">${clientVisits.filter(v=>v.status==='completed').length}</div>
        <div style="font-size:11px;color:#64748b;">Completed Visits</div>
      </div>
      <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#dc2626;">${clientAlerts.length}</div>
        <div style="font-size:11px;color:#64748b;">Open Alerts</div>
      </div>
      <div style="background:#e8eef8;border:1px solid #c0d0ea;border-radius:10px;padding:14px;text-align:center;">
        <div style="font-size:24px;font-weight:700;color:#162d56;">${upcoming.length}</div>
        <div style="font-size:11px;color:#64748b;">Upcoming Visits</div>
      </div>
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Contact</div>
      ${[['Email', user.email],['Phone', client.phone || '—'],['Company', client.company_name || '—'],['Status', client.status],['Member Since', FMT.date(client.created_at)]].map(([k,v]) => `
        <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9;font-size:13px;">
          <span style="color:#64748b;">${k}</span>
          <span style="font-weight:500;color:#0f1e38;">${v || '—'}</span>
        </div>`).join('')}
    </div>

    <div style="margin-bottom:20px;">
      <div style="font-size:12px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;">Properties</div>
      ${props.map(p => `
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px 14px;margin-bottom:8px;cursor:pointer;"
          onclick="window.location.href='admin-properties.html?propId=${p.id}'" >
          <div style="font-weight:600;font-size:13px;color:#0f1e38;">${p.property_name}</div>
          <div style="font-size:12px;color:#64748b;">${p.address_line1}, ${p.city}, ${p.state}</div>
        </div>`).join('') || '<div style="color:#94a3b8;font-size:13px;">No properties</div>'}
    </div>

    <div style="display:flex;gap:10px;">
      <button class="btn-primary" style="flex:1;" onclick="window.location.href='admin-schedule.html#new'">Schedule Visit</button>
      <button class="btn-secondary-outline" onclick="editClient('${clientId}')">Edit Client</button>
    </div>`;

  document.getElementById('clientDetailPanel').style.display = 'flex';
}
function closeClientDetail() {
  document.getElementById('clientDetailPanel').style.display = 'none';
}

// ── Selection & Bulk Email ────────────────────────────────────────────────────
function toggleClientSelect(clientId, checked) {
  if (checked) _selectedClients.add(clientId);
  else _selectedClients.delete(clientId);
  updateBulkActionBar();
}

function toggleSelectAll(checked) {
  // Select/deselect all currently visible clients
  document.querySelectorAll('input[type="checkbox"][onchange*="toggleClientSelect"]').forEach(cb => {
    const id = (cb.getAttribute('onchange') || '').match(/'([^']+)'/)?.[1];
    if (id) {
      if (checked) _selectedClients.add(id);
      else _selectedClients.delete(id);
    }
    cb.checked = checked;
  });
  updateBulkActionBar();
}

function clearSelection() {
  _selectedClients.clear();
  filterClients();
}

function updateBulkActionBar() {
  const bar   = document.getElementById('bulkActionBar');
  const count = _selectedClients.size;
  if (count > 0) {
    bar.style.display = 'flex';
    document.getElementById('bulkSelCount').textContent = `${count} client${count !== 1 ? 's' : ''} selected`;
  } else {
    bar.style.display = 'none';
  }
}

function openBulkEmailModal() {
  const count  = _selectedClients.size;
  if (!count) return;
  document.getElementById('bulkEmailRecipientSummary').textContent = `${count} client${count !== 1 ? 's' : ''} selected`;
  document.getElementById('bulkSendCount').textContent = count;
  document.getElementById('bulkEmailTemplate').value = '';
  document.getElementById('bulkEmailNote').value = '';
  document.getElementById('bulkEmailPreview').style.display = 'none';

  // Populate custom templates option group
  const customGroup = document.getElementById('bulkTplCustomGroup');
  if (_bulkCustomTemplates.length) {
    customGroup.style.display = '';
    customGroup.innerHTML = _bulkCustomTemplates.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
  } else {
    customGroup.style.display = 'none';
    customGroup.innerHTML = '';
  }

  document.getElementById('bulkEmailModal').style.display = 'flex';
}

function closeBulkEmailModal() {
  document.getElementById('bulkEmailModal').style.display = 'none';
}

function previewBulkTemplate() {
  const id  = document.getElementById('bulkEmailTemplate').value;
  const tpl = BULK_EMAIL_TEMPLATES.find(t => t.id === id) || _bulkCustomTemplates.find(t => t.id === id);
  const previewBox = document.getElementById('bulkEmailPreview');
  if (!tpl) { previewBox.style.display = 'none'; return; }
  document.getElementById('bulkPreviewSubject').textContent = tpl.subject;
  document.getElementById('bulkPreviewBody').textContent    = tpl.body;
  previewBox.style.display = 'block';
}

function sendBulkEmail() {
  const id  = document.getElementById('bulkEmailTemplate').value;
  const tpl = BULK_EMAIL_TEMPLATES.find(t => t.id === id) || _bulkCustomTemplates.find(t => t.id === id);
  if (!id || !tpl) { showToast('Please select an email template', 'error'); return; }
  const count = _selectedClients.size;
  // Simulate send (backend SMTP required)
  showToast(`Bulk email "${tpl.name}" queued for ${count} client${count !== 1 ? 's' : ''} — backend SMTP required for delivery`, 'info');
  closeBulkEmailModal();
}

function showToast(msg, type = 'success') {
  let container = document.getElementById('clientsToast');
  if (!container) {
    container = document.createElement('div');
    container.id = 'clientsToast';
    container.style.cssText = 'position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999;';
    document.body.appendChild(container);
  }
  const cfg = {
    success: { bg:'#f0fdf4', color:'#166534', border:'#bbf7d0' },
    error:   { bg:'#fef2f2', color:'#dc2626', border:'#fca5a5' },
    info:    { bg:'#f0f6ff', color:'#1e40af', border:'#bfdbfe' },
  }[type] || {};
  const t = document.createElement('div');
  t.style.cssText = `background:${cfg.bg};color:${cfg.color};border:1px solid ${cfg.border};padding:12px 18px;border-radius:10px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(0,0,0,.1);max-width:360px;`;
  t.textContent = msg;
  container.appendChild(t);
  setTimeout(() => t.remove(), 5000);
}
</script>
